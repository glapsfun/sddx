name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Runs only when release-please just cut a release (tag + GitHub Release).
  # Publishes the same tagged tree to npm via OIDC trusted publishing — no
  # NPM_TOKEN secret stored anywhere. Requires the one-time bootstrap publish
  # and trusted-publisher configuration documented in docs/RELEASING.md.
  #
  # No build step here: dist/cli.mjs is committed and CI's `verify` job
  # (ci.yml) already hard-fails any PR — including the release PR — if
  # dist/ drifts from src/, so the tagged tree's dist/cli.mjs is already
  # guaranteed current. Rebuilding it here would just redo that work.
  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing requires npm >= 11.5.1; setup-node's bundled
      # npm may be older, so pin an npm version known to support it.
      - run: npm install -g npm@^11.5.1
      - run: npm publish --provenance
