name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/pipx/venvs/pre-commit
            ~/.local/bin/pre-commit
          key: ${{ runner.os }}-pipx-pre-commit
      - run: pipx install pre-commit
      # Commit-stage hooks only; typecheck/test/build stay in the verify/test jobs.
      - run: pre-commit run --all-files --show-diff-on-failure

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - name: dist drift check
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            git status --porcelain -- dist
            echo "dist/ is out of sync with src/ — run 'bun run build' and commit the result" >&2
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun test

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/validate-plugin

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Offline: only intra-repo links are checked, keeping CI network-independent.
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md CHANGELOG.md 'docs/**/*.md' 'examples/**/*.md'
          fail: true
