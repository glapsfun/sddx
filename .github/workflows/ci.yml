name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pipx install pre-commit
      # Commit-stage hooks only; typecheck/test/build stay in the ci job.
      - run: pre-commit run --all-files --show-diff-on-failure

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: dist drift check
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            git status --porcelain -- dist
            echo "dist/ is out of sync with src/ — run 'bun run build' and commit the result" >&2
            exit 1
          fi
      - name: plugin validate (strict)
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.211
          claude plugin validate --strict .
